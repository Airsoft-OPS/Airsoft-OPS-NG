<nav class="navbar">
    <div class="nav-inner">

        <!-- Logo -->
        <a routerLink="/" class="nav-logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L2 7l10 5 10-5-10-5z" fill="var(--accent)" />
                    <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--accent-2)" stroke-width="1.5" fill="none" />
                </svg>
            </div>
            <span class="logo-text">OPS</span>
        </a>

        <!-- Nav links -->
        <ul class="nav-links">
            <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
            <li><a routerLink="/about" routerLinkActive="active">About</a></li>
        </ul>

        <!-- Auth area -->
        <div class="nav-auth">
            @if (supabase.currentUser()) {
            <div class="user-info">
                <div class="user-avatar">
                    {{ supabase.currentUser()!.email![0].toUpperCase() }}
                </div>
                <span class="user-email">{{ supabase.currentUser()!.email }}</span>
                <button class="btn-logout" (click)="logout()">Sair</button>
            </div>
            } @else {
            <button class="btn-login" (click)="openModal()">
                Login / Registar
            </button>
            }
        </div>

    </div>
</nav>

@if (showModal()) {
<app-auth-modal (close)="closeModal()"></app-auth-modal>
}
